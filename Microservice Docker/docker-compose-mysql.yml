version: '3.9'
services:

  mysqldb:
    restart: always
    ports:
          - 3306:3306
    image: mysql:latest
    environment:
          MYSQL_ROOT_PASSWORD: foo123
          MYSQL_USER: admin
          MYSQL_PASSWORD: foo123
          MYSQL_DATABASE: blue_rock_db
    volumes:
          - ./data/mysql/data:/var/lib/mysql