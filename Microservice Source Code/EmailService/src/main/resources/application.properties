server.port=8500
spring.application.name=email-service

spring.kafka.consumer.group-id=default
topic.simple.email=send.simple.email
topic.attachment.email=send.email.attachment
spring.kafka.bootstrap-servers=localhost:9091

spring.redis.host=localhost
spring.redis.port=6379

spring.datasource.url=jdbc:mysql://localhost:3306/blue_rock_db?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=admin
spring.datasource.password=foo123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate

spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.validate-on-migrate=false
spring.flyway.url=jdbc:mysql://localhost:3306/blue_rock_db?useSSL=false&allowPublicKeyRetrieval=true
spring.flyway.user=admin
spring.flyway.password=foo123

grpc.server.hostname=localhost
grpc.server.port=8410